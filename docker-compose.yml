services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - pdf_storage:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pdf_storage:
